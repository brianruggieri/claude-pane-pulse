name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Run shellcheck on all shell files
        run: |
          shellcheck --severity=error bin/ccp lib/*.sh install.sh uninstall.sh

  test:
    name: Test Suite
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jq

      - name: Run test suite
        run: bash tests/test-suite.sh

  e2e:
    name: E2E Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jq

      - name: Run e2e tests
        run: FAST=1 bash tests/e2e/run-e2e.sh

  install-smoke:
    name: Install Smoke Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jq

      - name: Run installer
        run: bash install.sh

      - name: Verify ccp is runnable
        run: |
          ~/.local/share/ccp/bin/ccp --version
